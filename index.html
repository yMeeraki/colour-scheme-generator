<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colour Scheme Generator</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main>
      <section>
        <form id="select-color">
          <input type="color" id="color" />
          <select id="mode-select">
            <option value="monochrome">Monochrome</option>
            <option value="monochrome-dark">Monochrome-dark</option>
            <option value="monochrome-light">Monochrome-light</option>
            <option value="analogic">Analogic</option>
            <option value="complement">Complement</option>
            <option value="analogic-complement">Analogic</option>
            <option value="traid">Traid</option>
          </select>
          <button type="submit">Get color scheme</button>
        </form>
      </section>
      <section class="color-section" id="color-section-container">
        <div>
          <div class="color red"></div>
          <div class="hex-color">#ffff</div>
        </div>
        <div>
          <div class="color blue"></div>
          <div class="hex-color">#ffff</div>
        </div>
        <div>
          <div class="color red"></div>
          <div class="hex-color">#ffff</div>
        </div>
        <div>
          <div class="color blue"></div>
          <div class="hex-color">#ffff</div>
        </div>
        <div>
          <div class="color red"></div>
          <div class="hex-color">#ffff</div>
        </div>
      </section>
    </main>
  </body>
  <script type="module" src="index.js"></script>
</html>
